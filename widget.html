<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hochkar Buchungs-Widget</title>

  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent !important;
    }

    body{
      font-family:'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:12px;
      -webkit-text-size-adjust:100%;
    }

    #hk-widget{
      max-width:860px; /* am PC etwas breiter */
      width:100%;
      background:#fff;
      border:1px solid #d5d9e2;
      border-radius:14px;
      padding:16px;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
      overflow:hidden;
    }

    .hk-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }

    .hk-titles{
      min-width:0;
      flex:1 1 auto;
    }

    .hk-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      line-height:1.15;
    }

    .hk-subtitle{
      color:#6b7280;
      font-size:14px;
      line-height:1.3;
      margin-top:2px;
    }

    .hk-logo{
      height:40px;
      width:auto;
      object-fit:contain;
      flex-shrink:0;
    }

    .hk-body{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      min-width:0;
    }

    .hk-section{
      flex:1 1 320px;
      border:1px solid #ececf1;
      border-radius:12px;
      padding:14px;
      min-width:0;
      overflow:hidden;
    }

    .hk-section-title{
      font-weight:700;
      margin-bottom:10px;
      font-size:16px;
    }

    /* Datum */
    .hk-daterow{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:10px;
      align-items:end;
      width:100%;
      min-width:0;
    }

    .hk-datefield{
      min-width:0;
      width:100%;
    }

    .hk-datefield label{
      display:block;
      font-size:12px;
      color:#6b7280;
      margin-bottom:4px;
      font-weight:600;
    }

    .hk-datewrap{
      position:relative;
      width:100%;
      min-width:0;
      max-width:100%;
      overflow:hidden;
    }

    input[type="date"]{
      display:block;
      width:100%;
      max-width:100%;
      min-width:0;
      height:44px;
      padding:10px 42px 10px 12px;
      border:1px solid #d1d5db;
      border-radius:12px;
      background:#fff;
      color:#111827;
      font-size:14px;
      line-height:1.2;
      font-family:'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      appearance:auto;
      -webkit-appearance:auto;
    }

    .hk-dateicon{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      width:18px;
      height:18px;
      pointer-events:none;
      color:#6b7280;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .hk-dateicon svg{
      width:18px;
      height:18px;
      display:block;
    }

    .hk-hint{
      margin-top:8px;
      color:#6b7280;
      font-size:12px;
      line-height:1.35;
    }

    .hk-duration{
      margin-top:8px;
      font-size:13px;
      font-weight:600;
    }

    /* Counter */
    .hk-counters{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .hk-counter-row{
      display:grid;
      grid-template-columns:46px minmax(0,1fr) auto;
      gap:12px;
      align-items:center;
      border:1px solid #ececf1;
      border-radius:12px;
      padding:12px;
      min-height:76px;
    }

    .hk-count{
      font-size:24px;
      font-weight:800;
      text-align:center;
      min-width:28px;
      line-height:1;
    }

    .hk-labelgroup{
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .hk-label{
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.2;
    }

    .hk-sublabel{
      color:#6b7280;
      font-size:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.2;
      margin-top:2px;
    }

    .hk-actions{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .hk-btn{
      width:38px;
      height:38px;
      border-radius:10px;
      border:1px solid #d1d5db;
      background:#fff;
      font-size:20px;
      line-height:1;
      cursor:pointer;
      font-family:'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }

    .hk-btn:disabled{
      opacity:.35;
      cursor:not-allowed;
    }

    .hk-error{
      margin-top:8px;
      color:#b00020;
      font-size:14px;
    }

    .hk-footer{
      margin-left:auto;
      margin-top:8px;
    }

    .hk-cta{
      padding:12px 18px;
      border-radius:12px;
      border:0;
      background:#154696;
      color:#fff;
      font-weight:700;
      cursor:pointer;
      min-width:140px;
      font-family:'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }

    .hk-cta:hover{
      background:#103874;
    }

    /* Allgemein Mobile */
    @media (max-width: 768px){
      .hk-daterow{
        grid-template-columns:1fr;
      }

      .hk-logo{
        height:32px;
      }
    }

    /* iPhone / iOS Safari */
    @supports (-webkit-touch-callout: none) {
      body{
        padding:10px;
      }

      .hk-daterow{
        grid-template-columns:1fr !important;
      }

      .hk-datefield,
      .hk-datewrap{
        width:100%;
        min-width:0;
        max-width:100%;
        overflow:hidden;
      }

      input[type="date"]{
        width:100% !important;
        min-width:0 !important;
        max-width:100% !important;
        height:48px;
        font-size:16px; /* verhindert iOS Zoom */
        padding:10px 40px 10px 12px;
        border-radius:12px;
      }

      .hk-dateicon{
        right:10px;
      }

      .hk-counter-row{
        grid-template-columns:42px minmax(0,1fr) auto;
        gap:10px;
        min-height:72px;
      }

      .hk-btn{
        width:36px;
        height:36px;
      }

      .hk-label{
        font-size:15px;
      }

      .hk-sublabel{
        font-size:12px;
      }
    }
  </style>
</head>

<body>
  <div id="hk-widget">
    <div class="hk-header">
      <div class="hk-titles">
        <h3 class="hk-title">Skitickets</h3>
        <div class="hk-subtitle">Stunden-, Tages- & Mehrtagestickets</div>
      </div>
      <img class="hk-logo" src="https://www.hochkar.com/portal/dist/images/branding/hochkar/logo.db33c945.png" alt="Hochkar Logo">
    </div>

    <div class="hk-body">
      <div class="hk-section" id="hk-date-section">
        <div class="hk-section-title">Datumsbereich</div>

        <div class="hk-daterow">
          <div class="hk-datefield">
            <label for="hk-start">Von</label>
            <div class="hk-datewrap">
              <input type="date" id="hk-start" required>
              <span class="hk-dateicon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                  <line x1="16" y1="3" x2="16" y2="7"></line>
                  <line x1="8" y1="3" x2="8" y2="7"></line>
                  <line x1="3" y1="11" x2="21" y2="11"></line>
                </svg>
              </span>
            </div>
          </div>

          <div class="hk-datefield">
            <label for="hk-end">Bis</label>
            <div class="hk-datewrap">
              <input type="date" id="hk-end" disabled>
              <span class="hk-dateicon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                  <line x1="16" y1="3" x2="16" y2="7"></line>
                  <line x1="8" y1="3" x2="8" y2="7"></line>
                  <line x1="3" y1="11" x2="21" y2="11"></line>
                </svg>
              </span>
            </div>
          </div>
        </div>

        <div class="hk-hint">Buchbar sind 1–6 Tage. „Bis“ leer lassen, um 1 Tag zu buchen.</div>
        <div class="hk-duration" id="hk-duration">Ausgewählte Dauer: –</div>
      </div>

      <div class="hk-section hk-counters">
        <div class="hk-counter-row">
          <div class="hk-count" id="hk-adults-count">1</div>
          <div class="hk-labelgroup">
            <div class="hk-label">Erwachsene</div>
            <div class="hk-sublabel">ab 16 Jahren</div>
          </div>
          <div class="hk-actions">
            <button class="hk-btn" id="hk-adults-minus" type="button">–</button>
            <button class="hk-btn" id="hk-adults-plus" type="button">+</button>
          </div>
        </div>

        <div class="hk-counter-row">
          <div class="hk-count" id="hk-kids-count">0</div>
          <div class="hk-labelgroup">
            <div class="hk-label">Kinder</div>
            <div class="hk-sublabel">6–15 Jahre</div>
          </div>
          <div class="hk-actions">
            <button class="hk-btn" id="hk-kids-minus" type="button" disabled>–</button>
            <button class="hk-btn" id="hk-kids-plus" type="button">+</button>
          </div>
        </div>
      </div>

      <div id="hk-error" class="hk-error" style="display:none"></div>

      <div class="hk-footer">
        <button id="hk-submit" class="hk-cta" type="button">Weiter</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const qs   = new URLSearchParams(location.search);
    const LANG = (qs.get('lang') || navigator.language || 'de')
      .toLowerCase()
      .startsWith('en') ? 'en' : 'de';

    const TEXTS = {
      de: {
        title: "Skitickets",
        subtitle: "Stunden-, Tages- & Mehrtagestickets",
        dateSection: "Datumsbereich",
        from: "Von",
        to: "Bis",
        hint: "Buchbar sind 1–6 Tage. „Bis“ leer lassen, um 1 Tag zu buchen.",
        durationPrefix: "Ausgewählte Dauer:",
        day: "Tag",
        days: "Tage",
        adults: "Erwachsene",
        adultsSub: "ab 16 Jahren",
        kids: "Kinder",
        kidsSub: "6–15 Jahre",
        cta: "Weiter",
        errNoStart: "Bitte Startdatum wählen.",
        errDuration: "Bitte Dauer zwischen 1 und 6 Tagen wählen."
      },
      en: {
        title: "Ski tickets",
        subtitle: "Hourly, day & multi-day tickets",
        dateSection: "Date range",
        from: "From",
        to: "To",
        hint: "You can book 1–6 days. Leave “To” empty to book 1 day.",
        durationPrefix: "Selected duration:",
        day: "day",
        days: "days",
        adults: "Adults",
        adultsSub: "from 16 years",
        kids: "Children",
        kidsSub: "6–15 years",
        cta: "Continue",
        errNoStart: "Please select a start date.",
        errDuration: "Please choose a duration between 1 and 6 days."
      }
    };

    const MAX_DAYS = 6;
    const $ = id => document.getElementById(id);

    const elStart      = $("hk-start");
    const elEnd        = $("hk-end");
    const dur          = $("hk-duration");
    const err          = $("hk-error");
    const adultsCount  = $("hk-adults-count");
    const kidsCount    = $("hk-kids-count");
    const kidsMinusBtn = $("hk-kids-minus");

    let adults = 1, kids = 0;

    function applyTranslations() {
      const t = TEXTS[LANG];

      document.documentElement.lang = LANG;

      document.querySelector(".hk-title").textContent = t.title;
      document.querySelector(".hk-subtitle").textContent = t.subtitle;
      document.querySelector("#hk-date-section .hk-section-title").textContent = t.dateSection;

      document.querySelector('label[for="hk-start"]').textContent = t.from;
      document.querySelector('label[for="hk-end"]').textContent   = t.to;
      document.querySelector(".hk-hint").textContent              = t.hint;

      const rows = document.querySelectorAll(".hk-counter-row");
      rows[0].querySelector(".hk-label").textContent    = t.adults;
      rows[0].querySelector(".hk-sublabel").textContent = t.adultsSub;
      rows[1].querySelector(".hk-label").textContent    = t.kids;
      rows[1].querySelector(".hk-sublabel").textContent = t.kidsSub;

      $("hk-submit").textContent = t.cta;
      dur.textContent = t.durationPrefix + " –";
    }

    function setCount(type, value){
      value = Math.max(0, Math.min(99, value|0));
      if (type === "adults") {
        adults = value;
        adultsCount.textContent = value;
      } else {
        kids = value;
        kidsCount.textContent = value;
        kidsMinusBtn.disabled = value <= 0;
      }
    }

    function bindPress(id, handler){
      const el = $(id);
      let touchedAt = 0;

      el.addEventListener('touchend', function(e){
        touchedAt = Date.now();
        e.preventDefault();
        handler();
      }, { passive: false });

      el.addEventListener('click', function(e){
        if (Date.now() - touchedAt < 700) {
          e.preventDefault();
          return;
        }
        handler();
      });
    }

    bindPress("hk-adults-minus", () => setCount("adults", adults - 1));
    bindPress("hk-adults-plus",  () => setCount("adults", adults + 1));
    bindPress("hk-kids-minus",   () => setCount("kids", kids - 1));
    bindPress("hk-kids-plus",    () => setCount("kids", kids + 1));

    function toISODate(d){
      return new Date(d).toISOString().split("T")[0];
    }

    function addDaysISO(iso, n){
      const dt = new Date(iso);
      dt.setDate(dt.getDate() + n);
      return toISODate(dt);
    }

    function diffDays(s, e){
      return Math.round((new Date(e) - new Date(s)) / 86400000) + 1;
    }

    function updateDuration(){
      const t = TEXTS[LANG];
      const s = elStart.value;
      const e = elEnd.value || s;

      if (!s) {
        dur.textContent = t.durationPrefix + " –";
        return;
      }

      const d = diffDays(s, e);
      dur.textContent = `${t.durationPrefix} ${d} ${d === 1 ? t.day : t.days}`;
    }

    function syncConstraints() {
      const s = elStart.value;

      if (!s) {
        elEnd.value = "";
        elEnd.disabled = true;
        updateDuration();
        return;
      }

      elEnd.disabled = false;
      elEnd.min = s;
      elEnd.max = addDaysISO(s, MAX_DAYS - 1);
      elEnd.value = s;

      updateDuration();
    }

    ["input","change","blur"].forEach(evt => {
      elStart.addEventListener(evt, syncConstraints);
      elEnd.addEventListener(evt, updateDuration);
    });

    function buildShopUrl(formState){
      const base = (LANG === 'en')
        ? 'https://shop.hochkar.com/en/products/skitickets'
        : 'https://shop.hochkar.com/products/skitickets';

      const url = new URL(base);

      const UTM_DEFAULT = {
        utm_source:'referral',
        utm_medium:'widget',
        utm_campaign:'hok',
        utm_content:'undefined'
      };

      const utms = { ...UTM_DEFAULT };

      ['utm_source','utm_medium','utm_campaign','utm_content'].forEach(k => {
        if (qs.get(k)) utms[k] = qs.get(k);
      });

      Object.entries(utms).forEach(([k,v]) => url.searchParams.set(k,v));
      url.searchParams.set('formState', JSON.stringify(formState));

      return url.toString();
    }

    $("hk-submit").onclick = () => {
      const t = TEXTS[LANG];
      err.style.display = "none";

      const s = elStart.value;
      if (!s) {
        err.textContent = t.errNoStart;
        err.style.display = "block";
        return;
      }

      const e = elEnd.value || s;
      const d = diffDays(s, e);

      if (d < 1 || d > MAX_DAYS) {
        err.textContent = t.errDuration;
        err.style.display = "block";
        return;
      }

      const from = new Date(s + "T00:00:00").toISOString();
      const to   = new Date(e + "T23:59:59.999").toISOString();

      const allocation = [];
      if (adults > 0) allocation.push({kind:"anonymous",quantity:adults,personType:"adult"});
      if (kids   > 0) allocation.push({kind:"anonymous",quantity:kids,personType:"child"});

      const formState = {
        validity:{ from, to },
        allocation:{ kind:"persontype", values:allocation },
        attributes:{ duration:"1d" }
      };

      window.open(buildShopUrl(formState), "_blank", "noopener");
    };

    applyTranslations();
    setCount("adults", 1);
    setCount("kids", 0);
    updateDuration();
  })();

  /* Auto-Resize für iFrame */
  (function(){
    const ROOT = document.getElementById('hk-widget');
    const BODY_PADDING = 24;

    function calcHeight(){
      return Math.ceil(ROOT.getBoundingClientRect().height) + BODY_PADDING;
    }

    function post(reason){
      parent.postMessage({
        type:'HKWIDGET_HEIGHT',
        height:calcHeight(),
        reason
      }, '*');
    }

    window.addEventListener('load', () => post('load'));
    window.addEventListener('resize', () => post('resize'));

    const mo = new MutationObserver(() => {
      clearTimeout(post._t);
      post._t = setTimeout(() => post('mut'), 50);
    });

    mo.observe(ROOT, {subtree:true, childList:true, attributes:true});

    setTimeout(() => post('delay300'), 300);
    setTimeout(() => post('delay1200'), 1200);
  })();
  </script>
</body>
</html>
