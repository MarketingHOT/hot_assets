<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hochkar Buchungs-Widget</title>

  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --hk-bg: #ffffff;
      --hk-surface: #f8fafc;
      --hk-border: #dbe3ee;
      --hk-border-strong: #c4cfdd;
      --hk-text: #0f172a;
      --hk-text-soft: #64748b;
      --hk-primary: #154696;
      --hk-primary-hover: #103874;
      --hk-primary-soft: rgba(21, 70, 150, 0.08);
      --hk-danger: #b00020;
      --hk-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: transparent !important;
    }

    body {
      font-family: 'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 12px;
      color: var(--hk-text);
      -webkit-text-size-adjust: 100%;
    }

    button {
      font-family: inherit;
    }

    #hk-widget {
      width: 100%;
      max-width: 880px;
      min-width: 0;
      background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
      border: 1px solid var(--hk-border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--hk-shadow);
      overflow: hidden;
    }

    .hk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(219, 227, 238, 0.8);
      min-width: 0;
    }

    .hk-titles {
      min-width: 0;
      flex: 1 1 auto;
    }

    .hk-title {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .hk-subtitle {
      margin-top: 4px;
      color: var(--hk-text-soft);
      font-size: 14px;
      line-height: 1.35;
    }

    .hk-logo {
      height: 42px;
      width: auto;
      max-width: 130px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .hk-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
      min-width: 0;
    }

    .hk-section {
      min-width: 0;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--hk-border);
      border-radius: 16px;
      padding: 16px;
      overflow: visible;
    }

    .hk-section-title {
      margin-bottom: 12px;
      font-size: 16px;
      font-weight: 800;
    }

    .hk-daterow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      width: 100%;
      min-width: 0;
    }

    .hk-datefield {
      min-width: 0;
      width: 100%;
      position: relative;
    }

    .hk-datefield label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--hk-text-soft);
    }

    .hk-datebutton {
      width: 100%;
      min-width: 0;
      min-height: 48px;
      padding: 11px 42px 11px 14px;
      border: 1px solid var(--hk-border-strong);
      border-radius: 14px;
      background: #fff;
      color: var(--hk-text);
      font-size: 15px;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      position: relative;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .hk-datebutton:hover {
      border-color: #9db1ce;
    }

    .hk-datebutton:focus-visible {
      outline: none;
      border-color: var(--hk-primary);
      box-shadow: 0 0 0 4px rgba(21, 70, 150, 0.12);
    }

    .hk-datebutton.is-placeholder {
      color: var(--hk-text-soft);
      font-weight: 600;
    }

    .hk-dateicon {
      position: absolute;
      right: 14px;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--hk-text-soft);
      pointer-events: none;
    }

    .hk-dateicon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .hk-hint {
      margin-top: 10px;
      color: var(--hk-text-soft);
      font-size: 12px;
      line-height: 1.45;
    }

    .hk-duration {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--hk-primary);
      background: var(--hk-primary-soft);
      border: 1px solid rgba(21, 70, 150, 0.14);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .hk-counters {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hk-counter-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 82px;
      padding: 12px;
      border: 1px solid var(--hk-border);
      border-radius: 16px;
      background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
      min-width: 0;
    }

    .hk-count {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(180deg, #eff4fb 0%, #e4edf9 100%);
      border: 1px solid #d5e1f2;
      font-size: 24px;
      font-weight: 800;
      line-height: 54px;
      text-align: center;
      color: var(--hk-primary);
    }

    .hk-labelgroup {
      min-width: 0;
    }

    .hk-label {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .hk-sublabel {
      margin-top: 3px;
      color: var(--hk-text-soft);
      font-size: 12px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .hk-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .hk-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--hk-border-strong);
      background: #fff;
      color: var(--hk-text);
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .hk-btn:hover:not(:disabled) {
      background: #f8fafc;
      border-color: #9db1ce;
    }

    .hk-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .hk-error {
      grid-column: 1 / -1;
      color: var(--hk-danger);
      font-size: 14px;
      font-weight: 700;
      background: rgba(176, 0, 32, 0.06);
      border: 1px solid rgba(176, 0, 32, 0.14);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .hk-footer {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
    }

    .hk-cta {
      min-width: 160px;
      padding: 14px 22px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--hk-primary) 0%, #123d85 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(21, 70, 150, 0.22);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .hk-cta:hover {
      background: linear-gradient(180deg, #1a4fa9 0%, var(--hk-primary-hover) 100%);
    }

    .hk-datepicker {
      grid-column: 1 / -1;
      width: 100%;
      max-width: 100%;
      border: 1px solid var(--hk-border);
      border-radius: 16px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.12);
    }

    .hk-datepicker[hidden] {
      display: none !important;
    }

    .hk-cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .hk-cal-title {
      font-size: 15px;
      font-weight: 800;
      text-align: center;
      flex: 1;
    }

    .hk-cal-nav {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      border: 1px solid var(--hk-border-strong);
      background: #fff;
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
    }

    .hk-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .hk-cal-weekday {
      font-size: 11px;
      font-weight: 800;
      color: var(--hk-text-soft);
      text-align: center;
      padding: 4px 0;
    }

    .hk-cal-day {
      min-width: 0;
      height: 40px;
      border-radius: 11px;
      border: 1px solid transparent;
      background: #f8fafc;
      color: var(--hk-text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .hk-cal-day:hover:not(:disabled) {
      border-color: #9db1ce;
      background: #fff;
    }

    .hk-cal-day.is-selected {
      background: var(--hk-primary);
      color: #fff;
      border-color: var(--hk-primary);
    }

    .hk-cal-day.is-today:not(.is-selected) {
      border-color: var(--hk-primary);
      color: var(--hk-primary);
      background: var(--hk-primary-soft);
    }

    .hk-cal-day:disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }

    .hk-cal-empty {
      height: 40px;
    }

    .hk-cal-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 12px;
    }

    .hk-cal-action {
      border: 1px solid var(--hk-border-strong);
      background: #fff;
      border-radius: 11px;
      padding: 10px 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .hk-cal-action.primary {
      background: var(--hk-primary);
      border-color: var(--hk-primary);
      color: #fff;
    }

    @media (max-width: 900px) {
      .hk-body {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      #hk-widget {
        padding: 16px;
        border-radius: 16px;
      }

      .hk-header {
        align-items: flex-start;
      }

      .hk-title {
        font-size: 22px;
      }

      .hk-logo {
        height: 32px;
        max-width: 110px;
      }

      .hk-daterow {
        grid-template-columns: 1fr;
      }

      .hk-counter-row {
        grid-template-columns: 50px minmax(0, 1fr) auto;
        gap: 10px;
      }

      .hk-count {
        width: 50px;
        height: 50px;
        line-height: 48px;
        font-size: 22px;
      }

      .hk-btn {
        width: 40px;
        height: 40px;
      }

      .hk-footer {
        justify-content: stretch;
      }

      .hk-cta {
        width: 100%;
      }

      .hk-cal-day {
        height: 38px;
        font-size: 13px;
      }
    }

    @media (max-width: 380px) {
      #hk-widget {
        padding: 12px;
      }

      .hk-section {
        padding: 12px;
      }

      .hk-counter-row {
        grid-template-columns: 44px minmax(0, 1fr) auto;
      }

      .hk-count {
        width: 44px;
        height: 44px;
        line-height: 42px;
        font-size: 20px;
      }

      .hk-actions {
        gap: 6px;
      }

      .hk-btn {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>

<body>
  <div id="hk-widget">
    <div class="hk-header">
      <div class="hk-titles">
        <h3 class="hk-title">Skitickets</h3>
        <div class="hk-subtitle">Stunden-, Tages- & Mehrtagestickets</div>
      </div>
      <img class="hk-logo" src="https://www.hochkar.com/portal/dist/images/branding/hochkar/logo.db33c945.png" alt="Hochkar Logo">
    </div>

    <div class="hk-body">
      <div class="hk-section" id="hk-date-section">
        <div class="hk-section-title">Datumsbereich</div>

        <div class="hk-daterow">
          <div class="hk-datefield">
            <label id="hk-start-label">Von</label>
            <button class="hk-datebutton" id="hk-start-btn" type="button">
              <span id="hk-start-text"></span>
              <span class="hk-dateicon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                  <line x1="16" y1="3" x2="16" y2="7"></line>
                  <line x1="8" y1="3" x2="8" y2="7"></line>
                  <line x1="3" y1="11" x2="21" y2="11"></line>
                </svg>
              </span>
            </button>
          </div>

          <div class="hk-datefield">
            <label id="hk-end-label">Bis</label>
            <button class="hk-datebutton is-placeholder" id="hk-end-btn" type="button">
              <span id="hk-end-text"></span>
              <span class="hk-dateicon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                  <line x1="16" y1="3" x2="16" y2="7"></line>
                  <line x1="8" y1="3" x2="8" y2="7"></line>
                  <line x1="3" y1="11" x2="21" y2="11"></line>
                </svg>
              </span>
            </button>
          </div>
        </div>

        <div class="hk-hint">Buchbar sind 1–6 Tage. „Bis“ leer lassen, um 1 Tag zu buchen.</div>
        <div class="hk-duration" id="hk-duration">Ausgewählte Dauer: –</div>
      </div>

      <div class="hk-section hk-counters">
        <div class="hk-counter-row">
          <div class="hk-count" id="hk-adults-count">1</div>
          <div class="hk-labelgroup">
            <div class="hk-label" id="hk-adults-label">Erwachsene</div>
            <div class="hk-sublabel" id="hk-adults-sub">ab 16 Jahren</div>
          </div>
          <div class="hk-actions">
            <button class="hk-btn" id="hk-adults-minus" type="button">−</button>
            <button class="hk-btn" id="hk-adults-plus" type="button">+</button>
          </div>
        </div>

        <div class="hk-counter-row">
          <div class="hk-count" id="hk-kids-count">0</div>
          <div class="hk-labelgroup">
            <div class="hk-label" id="hk-kids-label">Kinder</div>
            <div class="hk-sublabel" id="hk-kids-sub">6–15 Jahre</div>
          </div>
          <div class="hk-actions">
            <button class="hk-btn" id="hk-kids-minus" type="button">−</button>
            <button class="hk-btn" id="hk-kids-plus" type="button">+</button>
          </div>
        </div>
      </div>

      <div id="hk-datepicker" class="hk-datepicker" hidden></div>

      <div id="hk-error" class="hk-error" style="display:none"></div>

      <div class="hk-footer">
        <button id="hk-submit" class="hk-cta" type="button">Weiter</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const qs = new URLSearchParams(location.search);
      const LANG = (qs.get("lang") || navigator.language || "de").toLowerCase().startsWith("en") ? "en" : "de";

      const TEXTS = {
        de: {
          title: "Skitickets",
          subtitle: "Stunden-, Tages- & Mehrtagestickets",
          dateSection: "Datumsbereich",
          from: "Von",
          to: "Bis",
          endPlaceholder: "Optional",
          hint: "Buchbar sind 1–6 Tage. „Bis“ leer lassen, um 1 Tag zu buchen.",
          durationPrefix: "Ausgewählte Dauer:",
          day: "Tag",
          days: "Tage",
          adults: "Erwachsene",
          adultsSub: "ab 16 Jahren",
          kids: "Kinder",
          kidsSub: "6–15 Jahre",
          cta: "Weiter",
          clear: "Bis löschen",
          close: "Schließen",
          errDuration: "Bitte Dauer zwischen 1 und 6 Tagen wählen.",
          errMinTickets: "Bitte mindestens 1 Ticket auswählen.",
          months: ["Jänner", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"],
          weekdays: ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"]
        },
        en: {
          title: "Ski tickets",
          subtitle: "Hourly, day & multi-day tickets",
          dateSection: "Date range",
          from: "From",
          to: "To",
          endPlaceholder: "Optional",
          hint: "You can book 1–6 days. Leave “To” empty to book 1 day.",
          durationPrefix: "Selected duration:",
          day: "day",
          days: "days",
          adults: "Adults",
          adultsSub: "from 16 years",
          kids: "Children",
          kidsSub: "6–15 years",
          cta: "Continue",
          clear: "Clear end date",
          close: "Close",
          errDuration: "Please choose a duration between 1 and 6 days.",
          errMinTickets: "Please select at least 1 ticket.",
          months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"],
          weekdays: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
        }
      };

      const MAX_DAYS = 6;
      const MAX_TICKETS = 99;

      const $ = (id) => document.getElementById(id);
      const t = TEXTS[LANG];

      const state = {
        start: todayISO(),
        end: "",
        adults: 1,
        kids: 0,
        pickerMode: null,
        pickerMonth: null
      };

      const els = {
        widget: $("hk-widget"),
        startBtn: $("hk-start-btn"),
        endBtn: $("hk-end-btn"),
        startText: $("hk-start-text"),
        endText: $("hk-end-text"),
        duration: $("hk-duration"),
        error: $("hk-error"),
        datepicker: $("hk-datepicker"),
        adultsCount: $("hk-adults-count"),
        kidsCount: $("hk-kids-count"),
        adultsMinus: $("hk-adults-minus"),
        adultsPlus: $("hk-adults-plus"),
        kidsMinus: $("hk-kids-minus"),
        kidsPlus: $("hk-kids-plus"),
        submit: $("hk-submit")
      };

      function todayISO() {
        return toISODateLocal(new Date());
      }

      function parseISODate(iso) {
        const parts = iso.split("-").map(Number);
        return new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0, 0);
      }

      function toISODateLocal(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function addDaysISO(iso, n) {
        const d = parseISODate(iso);
        d.setDate(d.getDate() + n);
        return toISODateLocal(d);
      }

      function diffDays(startISO, endISO) {
        return Math.round((parseISODate(endISO) - parseISODate(startISO)) / 86400000) + 1;
      }

      function formatDate(iso) {
        const d = parseISODate(iso);
        return `${String(d.getDate()).padStart(2, "0")}.${String(d.getMonth() + 1).padStart(2, "0")}.${d.getFullYear()}`;
      }

      function toLocalISOString(date) {
        const pad = (num, len = 2) => String(num).padStart(len, "0");
        const offsetMin = -date.getTimezoneOffset();
        const sign = offsetMin >= 0 ? "+" : "-";
        const abs = Math.abs(offsetMin);

        return (
          date.getFullYear() + "-" +
          pad(date.getMonth() + 1) + "-" +
          pad(date.getDate()) + "T" +
          pad(date.getHours()) + ":" +
          pad(date.getMinutes()) + ":" +
          pad(date.getSeconds()) + "." +
          pad(date.getMilliseconds(), 3) +
          sign +
          pad(Math.floor(abs / 60)) + ":" +
          pad(abs % 60)
        );
      }

      function totalTickets() {
        return state.adults + state.kids;
      }

      function hideError() {
        els.error.style.display = "none";
        els.error.textContent = "";
      }

      function showError(message) {
        els.error.textContent = message;
        els.error.style.display = "block";
        postHeight("error");
      }

      function applyTranslations() {
        document.documentElement.lang = LANG;
        document.querySelector(".hk-title").textContent = t.title;
        document.querySelector(".hk-subtitle").textContent = t.subtitle;
        document.querySelector("#hk-date-section .hk-section-title").textContent = t.dateSection;
        $("hk-start-label").textContent = t.from;
        $("hk-end-label").textContent = t.to;
        document.querySelector(".hk-hint").textContent = t.hint;
        $("hk-adults-label").textContent = t.adults;
        $("hk-adults-sub").textContent = t.adultsSub;
        $("hk-kids-label").textContent = t.kids;
        $("hk-kids-sub").textContent = t.kidsSub;
        els.submit.textContent = t.cta;
      }

      function validateDates() {
        if (!state.start) state.start = todayISO();

        if (state.end) {
          if (state.end < state.start) {
            state.end = "";
          } else if (diffDays(state.start, state.end) > MAX_DAYS) {
            state.end = addDaysISO(state.start, MAX_DAYS - 1);
          }
        }
      }

      function render() {
        validateDates();

        els.startText.textContent = formatDate(state.start);

        if (state.end) {
          els.endText.textContent = formatDate(state.end);
          els.endBtn.classList.remove("is-placeholder");
        } else {
          els.endText.textContent = t.endPlaceholder;
          els.endBtn.classList.add("is-placeholder");
        }

        const duration = diffDays(state.start, state.end || state.start);
        els.duration.textContent = `${t.durationPrefix} ${duration} ${duration === 1 ? t.day : t.days}`;

        els.adultsCount.textContent = String(state.adults);
        els.kidsCount.textContent = String(state.kids);

        els.adultsMinus.disabled = state.adults <= 0 || (totalTickets() <= 1 && state.adults > 0);
        els.kidsMinus.disabled = state.kids <= 0 || (totalTickets() <= 1 && state.kids > 0);
        els.adultsPlus.disabled = totalTickets() >= MAX_TICKETS;
        els.kidsPlus.disabled = totalTickets() >= MAX_TICKETS;

        renderPicker();
        postHeight("render");
      }

      function openPicker(mode) {
        hideError();
        state.pickerMode = mode;
        state.pickerMonth = firstOfMonth(mode === "end" && state.end ? state.end : state.start);
        render();
      }

      function closePicker() {
        state.pickerMode = null;
        render();
      }

      function firstOfMonth(iso) {
        const d = parseISODate(iso);
        return toISODateLocal(new Date(d.getFullYear(), d.getMonth(), 1, 12));
      }

      function changePickerMonth(delta) {
        const d = parseISODate(state.pickerMonth);
        d.setMonth(d.getMonth() + delta);
        state.pickerMonth = toISODateLocal(new Date(d.getFullYear(), d.getMonth(), 1, 12));
        renderPicker();
        postHeight("month");
      }

      function renderPicker() {
        if (!state.pickerMode) {
          els.datepicker.hidden = true;
          els.datepicker.innerHTML = "";
          return;
        }

        els.datepicker.hidden = false;

        const monthDate = parseISODate(state.pickerMonth);
        const year = monthDate.getFullYear();
        const month = monthDate.getMonth();
        const firstDay = new Date(year, month, 1, 12);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const startOffset = (firstDay.getDay() + 6) % 7;

        const selectedISO = state.pickerMode === "start" ? state.start : state.end;
        const minISO = state.pickerMode === "end" ? state.start : null;
        const maxISO = state.pickerMode === "end" ? addDaysISO(state.start, MAX_DAYS - 1) : null;
        const today = todayISO();

        let html = `
          <div class="hk-cal-head">
            <button class="hk-cal-nav" type="button" data-cal-prev aria-label="Previous month">‹</button>
            <div class="hk-cal-title">${t.months[month]} ${year}</div>
            <button class="hk-cal-nav" type="button" data-cal-next aria-label="Next month">›</button>
          </div>
          <div class="hk-cal-grid">
        `;

        t.weekdays.forEach((day) => {
          html += `<div class="hk-cal-weekday">${day}</div>`;
        });

        for (let i = 0; i < startOffset; i++) {
          html += `<div class="hk-cal-empty"></div>`;
        }

        for (let day = 1; day <= daysInMonth; day++) {
          const iso = toISODateLocal(new Date(year, month, day, 12));
          const disabled = state.pickerMode === "end" && (iso < minISO || iso > maxISO);
          const selected = iso === selectedISO;
          const isToday = iso === today;

          html += `
            <button
              class="hk-cal-day${selected ? " is-selected" : ""}${isToday ? " is-today" : ""}"
              type="button"
              data-date="${iso}"
              ${disabled ? "disabled" : ""}
            >${day}</button>
          `;
        }

        html += `
          </div>
          <div class="hk-cal-actions">
            ${state.pickerMode === "end" ? `<button class="hk-cal-action" type="button" data-cal-clear>${t.clear}</button>` : `<span></span>`}
            <button class="hk-cal-action primary" type="button" data-cal-close>${t.close}</button>
          </div>
        `;

        els.datepicker.innerHTML = html;
      }

      function setCount(type, delta) {
        hideError();

        if (type === "adults") {
          const next = Math.max(0, Math.min(MAX_TICKETS, state.adults + delta));
          if (delta < 0 && totalTickets() <= 1 && state.adults > 0) return;
          state.adults = next;
        }

        if (type === "kids") {
          const next = Math.max(0, Math.min(MAX_TICKETS, state.kids + delta));
          if (delta < 0 && totalTickets() <= 1 && state.kids > 0) return;
          state.kids = next;
        }

        render();
      }

      function buildShopUrl(formState) {
        const base = LANG === "en"
          ? "https://shop.hochkar.com/en/products/skitickets"
          : "https://shop.hochkar.com/products/skitickets";

        const url = new URL(base);

        const utms = {
          utm_source: "referral",
          utm_medium: "widget",
          utm_campaign: "hok",
          utm_content: "undefined"
        };

        ["utm_source", "utm_medium", "utm_campaign", "utm_content"].forEach((key) => {
          if (qs.get(key)) utms[key] = qs.get(key);
        });

        Object.entries(utms).forEach(([key, value]) => url.searchParams.set(key, value));
        url.searchParams.set("formState", JSON.stringify(formState));

        return url.toString();
      }

      function submit() {
        hideError();

        if (totalTickets() < 1) {
          showError(t.errMinTickets);
          return;
        }

        const endISO = state.end || state.start;
        const duration = diffDays(state.start, endISO);

        if (duration < 1 || duration > MAX_DAYS) {
          showError(t.errDuration);
          return;
        }

        const startBase = parseISODate(state.start);
        const endBase = parseISODate(endISO);

        const fromDate = new Date(startBase.getFullYear(), startBase.getMonth(), startBase.getDate(), 0, 0, 0, 0);
        const toDate = new Date(endBase.getFullYear(), endBase.getMonth(), endBase.getDate(), 23, 59, 59, 999);

        const values = [];

        if (state.adults > 0) {
          values.push({ kind: "anonymous", quantity: state.adults, personType: "adult" });
        }

        if (state.kids > 0) {
          values.push({ kind: "anonymous", quantity: state.kids, personType: "child" });
        }

        const formState = {
          validity: {
            from: toLocalISOString(fromDate),
            to: toLocalISOString(toDate)
          },
          allocation: {
            kind: "persontype",
            values
          },
          attributes: {
            duration: `${duration}d`
          }
        };

        window.open(buildShopUrl(formState), "_blank", "noopener");
      }

      function bindEvents() {
        els.startBtn.addEventListener("click", () => openPicker("start"));
        els.endBtn.addEventListener("click", () => openPicker("end"));

        els.adultsMinus.addEventListener("click", () => setCount("adults", -1));
        els.adultsPlus.addEventListener("click", () => setCount("adults", 1));
        els.kidsMinus.addEventListener("click", () => setCount("kids", -1));
        els.kidsPlus.addEventListener("click", () => setCount("kids", 1));

        els.submit.addEventListener("click", submit);

        els.datepicker.addEventListener("click", (event) => {
          const target = event.target.closest("button");
          if (!target) return;

          if (target.hasAttribute("data-cal-prev")) {
            changePickerMonth(-1);
            return;
          }

          if (target.hasAttribute("data-cal-next")) {
            changePickerMonth(1);
            return;
          }

          if (target.hasAttribute("data-cal-close")) {
            closePicker();
            return;
          }

          if (target.hasAttribute("data-cal-clear")) {
            state.end = "";
            closePicker();
            return;
          }

          const date = target.getAttribute("data-date");
          if (!date) return;

          if (state.pickerMode === "start") {
            state.start = date;

            if (state.end && (state.end < state.start || diffDays(state.start, state.end) > MAX_DAYS)) {
              state.end = "";
            }
          }

          if (state.pickerMode === "end") {
            state.end = date;
          }

          closePicker();
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && state.pickerMode) closePicker();
        });
      }

      function postHeight(reason) {
        window.clearTimeout(postHeight._t);
        postHeight._t = window.setTimeout(() => {
          const height = Math.ceil(els.widget.getBoundingClientRect().height) + 24;
          parent.postMessage({ type: "HKWIDGET_HEIGHT", height, reason }, "*");
        }, 30);
      }

      applyTranslations();
      bindEvents();
      render();

      window.addEventListener("load", () => postHeight("load"));
      window.addEventListener("resize", () => postHeight("resize"));

      const mo = new MutationObserver(() => postHeight("mutation"));
      mo.observe(els.widget, { subtree: true, childList: true, attributes: true });

      setTimeout(() => postHeight("delay300"), 300);
      setTimeout(() => postHeight("delay1200"), 1200);
    })();
  </script>
</body>
</html>
