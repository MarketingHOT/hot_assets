<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hochkar Buchungs-Widget</title>

  <!-- Cabin Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin:0;
      padding:0;
      background: transparent !important;
    }

    body{
      font-family:'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:24px; /* wieder wie ursprünglich */
    }

    #hk-widget{
      max-width:720px;
      width:100%;
      background:#fff;
      border:1px solid #e6e6e9;
      border-radius:14px;
      padding:16px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
    }

    .hk-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }

    .hk-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      line-height:1.2;
    }

    .hk-subtitle{
      color:#6b7280;
      font-size:14px;
    }

    .hk-logo{
      height:40px;
      width:auto;
      object-fit:contain;
    }

    .hk-body{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      min-width:0;
    }

    .hk-section{
      flex:1 1 300px;
      border:1px solid #ececf1;
      border-radius:12px;
      padding:14px;
      min-width:0;
    }

    .hk-section-title{
      font-weight:600;
      margin-bottom:10px;
    }

    .hk-daterow{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:10px;
      align-items:end;
      width:100%;
    }

    .hk-datefield{
      min-width:0;
      width:100%;
    }

    .hk-datefield label{
      display:block;
      font-size:12px;
      color:#6b7280;
      margin-bottom:4px;
    }

    input[type="date"]{
      display:block;
      width:100%;
      padding:10px;
      border:1px solid #d1d5db;
      border-radius:12px;
      background:#fff;
      color:#111827;
      font-size:14px;
      font-family:'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .hk-hint{
      margin-top:8px;
      color:#6b7280;
      font-size:12px;
    }

    .hk-duration{
      margin-top:8px;
      font-size:13px;
      font-weight:600;
    }

    .hk-counters{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .hk-counter-row{
      display:grid;
      grid-template-columns:40px 1fr auto;
      gap:10px;
      align-items:center;
      border:1px solid #ececf1;
      border-radius:12px;
      padding:12px;
    }

    .hk-count{
      font-size:24px;
      font-weight:800;
      text-align:center;
    }

    .hk-label{ font-weight:700; }
    .hk-sublabel{ color:#6b7280; font-size:12px; }

    .hk-btn{
      width:36px;
      height:36px;
      border-radius:10px;
      border:1px solid #d1d5db;
      background:#fff;
      font-size:18px;
      cursor:pointer;
    }

    .hk-btn:disabled{
      opacity:.35;
      cursor:not-allowed;
    }

    .hk-error{
      margin-top:8px;
      color:#b00020;
      font-size:14px;
    }

    .hk-footer{
      margin-left:auto;
      margin-top:8px;
    }

    .hk-cta{
      padding:12px 18px;
      border-radius:12px;
      border:0;
      background:#154696;
      color:#fff;
      font-weight:700;
      cursor:pointer;
      min-width:140px;
      font-family:'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    .hk-cta:hover{
      background:#103874;
    }

    @media (max-width:510px){
      .hk-daterow{ grid-template-columns:1fr; }
      .hk-logo{ height:32px; }
    }
  </style>
</head>

<body>
  <div id="hk-widget">
    <div class="hk-header">
      <div>
        <h3 class="hk-title">Skitickets</h3>
        <div class="hk-subtitle">Stunden-, Tages- & Mehrtagestickets</div>
      </div>
      <img class="hk-logo" src="https://www.hochkar.com/portal/dist/images/branding/hochkar/logo.db33c945.png">
    </div>

    <div class="hk-body">
      <div class="hk-section">
        <div class="hk-section-title">Datumsbereich</div>

        <div class="hk-daterow">
          <div class="hk-datefield">
            <label>Von</label>
            <input type="date" id="hk-start">
          </div>

          <div class="hk-datefield">
            <label>Bis</label>
            <input type="date" id="hk-end" disabled>
          </div>
        </div>

        <div class="hk-hint">Buchbar sind 1–6 Tage. „Bis“ leer lassen, um 1 Tag zu buchen.</div>
        <div class="hk-duration" id="hk-duration">Ausgewählte Dauer: –</div>
      </div>

      <div class="hk-section hk-counters">
        <div class="hk-counter-row">
          <div class="hk-count" id="hk-adults-count">1</div>
          <div>
            <div class="hk-label">Erwachsene</div>
            <div class="hk-sublabel">ab 16 Jahren</div>
          </div>
          <div>
            <button class="hk-btn" id="hk-adults-minus">–</button>
            <button class="hk-btn" id="hk-adults-plus">+</button>
          </div>
        </div>

        <div class="hk-counter-row">
          <div class="hk-count" id="hk-kids-count">0</div>
          <div>
            <div class="hk-label">Kinder</div>
            <div class="hk-sublabel">6–15 Jahre</div>
          </div>
          <div>
            <button class="hk-btn" id="hk-kids-minus" disabled>–</button>
            <button class="hk-btn" id="hk-kids-plus">+</button>
          </div>
        </div>
      </div>

      <div id="hk-error" class="hk-error" style="display:none"></div>

      <div class="hk-footer">
        <button id="hk-submit" class="hk-cta">Weiter</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const PRODUCT_URL="https://shop.hochkar.com/products/skitickets";
    const MAX_DAYS=6;

    const $=id=>document.getElementById(id);

    const elStart=$("hk-start");
    const elEnd=$("hk-end");
    const dur=$("hk-duration");
    const err=$("hk-error");

    let adults=1,kids=0;

    function diffDays(s,e){
      return Math.round((new Date(e)-new Date(s))/86400000)+1;
    }

    function updateDuration(){
      const s=elStart.value;
      const e=elEnd.value||s;
      if(!s){dur.textContent="Ausgewählte Dauer: –";return;}
      const d=diffDays(s,e);
      dur.textContent=`Ausgewählte Dauer: ${d} ${d===1?"Tag":"Tage"}`;
    }

    elStart.onchange=()=>{
      const s=elStart.value;
      if(!s)return;

      elEnd.disabled=false;

      const max=new Date(s);
      max.setDate(max.getDate()+MAX_DAYS-1);

      elEnd.min=s;
      elEnd.max=max.toISOString().split("T")[0];
      elEnd.value=s;

      updateDuration();
    };

    elEnd.onchange=updateDuration;

    $("hk-submit").onclick=()=>{
      const s=elStart.value;
      const e=elEnd.value||s;

      if(!s){
        err.textContent="Bitte Startdatum wählen.";
        err.style.display="block";
        return;
      }

      const d=diffDays(s,e);
      if(d<1||d>MAX_DAYS){
        err.textContent="Bitte Dauer zwischen 1 und 6 Tagen wählen.";
        err.style.display="block";
        return;
      }

      const from=new Date(s+"T00:00:00");
      const to=new Date(e+"T23:59:59.999");

      const formState={
        validity:{from:from.toISOString(),to:to.toISOString()}
      };

      window.open(PRODUCT_URL+"?formState="+encodeURIComponent(JSON.stringify(formState)),"_blank");
    };
  })();

  /* Resize wieder MIT Padding */
  (function(){
    var ROOT=document.getElementById('hk-widget');
    var BODY_PADDING=48;

    function calcHeight(){
      return Math.ceil(ROOT.getBoundingClientRect().height)+BODY_PADDING;
    }

    function post(){
      parent.postMessage({type:'HKWIDGET_HEIGHT',height:calcHeight()},'*');
    }

    window.addEventListener('load',post);
    window.addEventListener('resize',post);

    setTimeout(post,300);
    setTimeout(post,1200);
  })();
  </script>
</body>
</html>
