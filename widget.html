<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hochkar Buchungs-Widget</title>

  <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --hk-bg: #ffffff;
      --hk-surface: #f8fafc;
      --hk-surface-2: #f1f5f9;
      --hk-border: #dbe3ee;
      --hk-border-strong: #c4cfdd;
      --hk-text: #0f172a;
      --hk-text-soft: #64748b;
      --hk-primary: #154696;
      --hk-primary-hover: #103874;
      --hk-primary-soft: rgba(21, 70, 150, 0.08);
      --hk-danger: #b00020;
      --hk-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --hk-radius-xl: 18px;
      --hk-radius-lg: 14px;
      --hk-radius-md: 12px;
      --hk-radius-sm: 10px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent !important;
    }

    body {
      font-family: 'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12px;
      -webkit-text-size-adjust: 100%;
      color: var(--hk-text);
    }

    #hk-widget {
      max-width: 880px;
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(248,250,252,1) 100%);
      border: 1px solid var(--hk-border);
      border-radius: var(--hk-radius-xl);
      padding: 20px;
      box-shadow: var(--hk-shadow);
      overflow: hidden;
    }

    .hk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(219, 227, 238, 0.8);
    }

    .hk-titles {
      min-width: 0;
      flex: 1 1 auto;
    }

    .hk-title {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      color: var(--hk-text);
      letter-spacing: -0.02em;
    }

    .hk-subtitle {
      color: var(--hk-text-soft);
      font-size: 14px;
      line-height: 1.35;
      margin-top: 4px;
    }

    .hk-logo {
      height: 42px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    .hk-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      min-width: 0;
      align-items: start;
    }

    .hk-section {
      background: rgba(255,255,255,0.85);
      border: 1px solid var(--hk-border);
      border-radius: 16px;
      padding: 16px;
      min-width: 0;
      overflow: hidden;
      backdrop-filter: blur(4px);
    }

    .hk-section-title {
      font-weight: 800;
      margin-bottom: 12px;
      font-size: 16px;
      color: var(--hk-text);
      letter-spacing: -0.01em;
    }

    .hk-daterow {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      align-items: end;
      width: 100%;
      min-width: 0;
    }

    .hk-datefield {
      min-width: 0;
      width: 100%;
    }

    .hk-datefield label {
      display: block;
      font-size: 12px;
      color: var(--hk-text-soft);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .hk-inputwrap {
      position: relative;
      width: 100%;
    }

    .hk-dateinput {
      width: 100%;
      height: 48px;
      padding: 10px 44px 10px 14px;
      border: 1px solid var(--hk-border-strong);
      border-radius: 14px;
      background: #fff;
      color: var(--hk-text);
      font-size: 14px;
      line-height: 1.2;
      font-family: 'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
      transition:
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;
      appearance: auto;
      -webkit-appearance: auto;
      cursor: pointer;
    }

    .hk-dateinput:hover:not(:disabled) {
      border-color: #9db1ce;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.05);
    }

    .hk-dateinput:focus {
      outline: none;
      border-color: var(--hk-primary);
      box-shadow: 0 0 0 4px rgba(21, 70, 150, 0.12);
    }

    .hk-dateinput:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      background: #f8fafc;
      border-color: var(--hk-border);
      box-shadow: none;
    }

    .hk-dateicon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      pointer-events: none;
      color: var(--hk-text-soft);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hk-dateicon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .hk-hint {
      margin-top: 10px;
      color: var(--hk-text-soft);
      font-size: 12px;
      line-height: 1.45;
    }

    .hk-duration {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--hk-primary);
      background: var(--hk-primary-soft);
      border: 1px solid rgba(21, 70, 150, 0.14);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .hk-counters {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hk-counter-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--hk-border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 16px;
      padding: 12px;
      min-height: 82px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .hk-counter-row:hover {
      border-color: #bfd0e6;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
    }

    .hk-count {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(180deg, #eff4fb 0%, #e4edf9 100%);
      border: 1px solid #d5e1f2;
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      line-height: 54px;
      color: var(--hk-primary);
      flex-shrink: 0;
    }

    .hk-labelgroup {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hk-label {
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
      color: var(--hk-text);
      font-size: 16px;
    }

    .hk-sublabel {
      color: var(--hk-text-soft);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.25;
      margin-top: 3px;
    }

    .hk-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .hk-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--hk-border-strong);
      background: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      font-family: 'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      font-weight: 700;
      color: var(--hk-text);
      transition:
        background 0.18s ease,
        border-color 0.18s ease,
        transform 0.12s ease,
        box-shadow 0.18s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .hk-btn:hover:not(:disabled) {
      background: #f8fafc;
      border-color: #9db1ce;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06);
    }

    .hk-btn:active:not(:disabled) {
      transform: translateY(1px);
    }

    .hk-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    .hk-error {
      grid-column: 1 / -1;
      margin-top: -4px;
      color: var(--hk-danger);
      font-size: 14px;
      font-weight: 700;
      background: rgba(176, 0, 32, 0.06);
      border: 1px solid rgba(176, 0, 32, 0.14);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .hk-footer {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .hk-cta {
      padding: 14px 22px;
      border-radius: 14px;
      border: 0;
      background: linear-gradient(180deg, var(--hk-primary) 0%, #123d85 100%);
      color: #fff;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      min-width: 160px;
      font-family: 'Cabin', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition:
        background 0.18s ease,
        transform 0.12s ease,
        box-shadow 0.18s ease;
      box-shadow: 0 10px 20px rgba(21, 70, 150, 0.22);
    }

    .hk-cta:hover {
      background: linear-gradient(180deg, #1a4fa9 0%, var(--hk-primary-hover) 100%);
      box-shadow: 0 12px 24px rgba(21, 70, 150, 0.28);
    }

    .hk-cta:active {
      transform: translateY(1px);
    }

    @media (max-width: 900px) {
      .hk-body {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      #hk-widget {
        padding: 16px;
        border-radius: 16px;
      }

      .hk-header {
        align-items: flex-start;
      }

      .hk-daterow {
        grid-template-columns: 1fr;
      }

      .hk-logo {
        height: 32px;
      }

      .hk-footer {
        justify-content: stretch;
      }

      .hk-cta {
        width: 100%;
      }
    }

    @supports (-webkit-touch-callout: none) {
      body {
        padding: 10px;
      }

      .hk-daterow {
        grid-template-columns: 1fr !important;
      }

      .hk-dateinput {
        font-size: 16px;
        height: 48px;
      }

      .hk-dateicon {
        right: 12px;
      }

      .hk-counter-row {
        grid-template-columns: 50px minmax(0, 1fr) auto;
        gap: 10px;
        min-height: 76px;
      }

      .hk-count {
        width: 50px;
        height: 50px;
        line-height: 48px;
        font-size: 22px;
        border-radius: 14px;
      }

      .hk-btn {
        width: 38px;
        height: 38px;
      }

      .hk-label {
        font-size: 15px;
      }

      .hk-sublabel {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="hk-widget">
    <div class="hk-header">
      <div class="hk-titles">
        <h3 class="hk-title">Skitickets</h3>
        <div class="hk-subtitle">Stunden-, Tages- & Mehrtagestickets</div>
      </div>
      <img
        class="hk-logo"
        src="https://www.hochkar.com/portal/dist/images/branding/hochkar/logo.db33c945.png"
        alt="Hochkar Logo"
      >
    </div>

    <div class="hk-body">
      <div class="hk-section" id="hk-date-section">
        <div class="hk-section-title">Datumsbereich</div>

        <div class="hk-daterow">
          <div class="hk-datefield">
            <label for="hk-start">Von</label>
            <div class="hk-inputwrap">
              <input type="date" id="hk-start" class="hk-dateinput" required>
              <span class="hk-dateicon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                  <line x1="16" y1="3" x2="16" y2="7"></line>
                  <line x1="8" y1="3" x2="8" y2="7"></line>
                  <line x1="3" y1="11" x2="21" y2="11"></line>
                </svg>
              </span>
            </div>
          </div>

          <div class="hk-datefield">
            <label for="hk-end">Bis</label>
            <div class="hk-inputwrap">
              <input type="date" id="hk-end" class="hk-dateinput" disabled>
              <span class="hk-dateicon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                  <line x1="16" y1="3" x2="16" y2="7"></line>
                  <line x1="8" y1="3" x2="8" y2="7"></line>
                  <line x1="3" y1="11" x2="21" y2="11"></line>
                </svg>
              </span>
            </div>
          </div>
        </div>

        <div class="hk-hint">Buchbar sind 1–6 Tage. „Bis“ leer lassen, um 1 Tag zu buchen.</div>
        <div class="hk-duration" id="hk-duration">Ausgewählte Dauer: –</div>
      </div>

      <div class="hk-section hk-counters">
        <div class="hk-counter-row">
          <div class="hk-count" id="hk-adults-count">1</div>
          <div class="hk-labelgroup">
            <div class="hk-label">Erwachsene</div>
            <div class="hk-sublabel">ab 16 Jahren</div>
          </div>
          <div class="hk-actions">
            <button class="hk-btn" id="hk-adults-minus" type="button">–</button>
            <button class="hk-btn" id="hk-adults-plus" type="button">+</button>
          </div>
        </div>

        <div class="hk-counter-row">
          <div class="hk-count" id="hk-kids-count">0</div>
          <div class="hk-labelgroup">
            <div class="hk-label">Kinder</div>
            <div class="hk-sublabel">6–15 Jahre</div>
          </div>
          <div class="hk-actions">
            <button class="hk-btn" id="hk-kids-minus" type="button" disabled>–</button>
            <button class="hk-btn" id="hk-kids-plus" type="button">+</button>
          </div>
        </div>
      </div>

      <div id="hk-error" class="hk-error" style="display:none"></div>

      <div class="hk-footer">
        <button id="hk-submit" class="hk-cta" type="button">Weiter</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const qs = new URLSearchParams(location.search);
      const LANG = (qs.get('lang') || navigator.language || 'de')
        .toLowerCase()
        .startsWith('en') ? 'en' : 'de';

      const TEXTS = {
        de: {
          title: "Skitickets",
          subtitle: "Stunden-, Tages- & Mehrtagestickets",
          dateSection: "Datumsbereich",
          from: "Von",
          to: "Bis",
          hint: "Buchbar sind 1–6 Tage. „Bis“ leer lassen, um 1 Tag zu buchen.",
          durationPrefix: "Ausgewählte Dauer:",
          day: "Tag",
          days: "Tage",
          adults: "Erwachsene",
          adultsSub: "ab 16 Jahren",
          kids: "Kinder",
          kidsSub: "6–15 Jahre",
          cta: "Weiter",
          errNoStart: "Bitte Startdatum wählen.",
          errDuration: "Bitte Dauer zwischen 1 und 6 Tagen wählen.",
          errMinTickets: "Bitte mindestens 1 Ticket auswählen."
        },
        en: {
          title: "Ski tickets",
          subtitle: "Hourly, day & multi-day tickets",
          dateSection: "Date range",
          from: "From",
          to: "To",
          hint: "You can book 1–6 days. Leave “To” empty to book 1 day.",
          durationPrefix: "Selected duration:",
          day: "day",
          days: "days",
          adults: "Adults",
          adultsSub: "from 16 years",
          kids: "Children",
          kidsSub: "6–15 years",
          cta: "Continue",
          errNoStart: "Please select a start date.",
          errDuration: "Please choose a duration between 1 and 6 days.",
          errMinTickets: "Please select at least 1 ticket."
        }
      };

      const MAX_DAYS = 6;
      const MAX_TICKETS = 99;

      const $ = (id) => document.getElementById(id);

      const elStart = $("hk-start");
      const elEnd = $("hk-end");
      const dur = $("hk-duration");
      const err = $("hk-error");

      const adultsCount = $("hk-adults-count");
      const kidsCount = $("hk-kids-count");

      const adultsMinusBtn = $("hk-adults-minus");
      const adultsPlusBtn = $("hk-adults-plus");
      const kidsMinusBtn = $("hk-kids-minus");
      const kidsPlusBtn = $("hk-kids-plus");

      let adults = 1;
      let kids = 0;

      function hideError() {
        err.style.display = "none";
        err.textContent = "";
      }

      function totalTickets() {
        return adults + kids;
      }

      function applyTranslations() {
        const t = TEXTS[LANG];

        document.documentElement.lang = LANG;
        document.querySelector(".hk-title").textContent = t.title;
        document.querySelector(".hk-subtitle").textContent = t.subtitle;
        document.querySelector("#hk-date-section .hk-section-title").textContent = t.dateSection;
        document.querySelector('label[for="hk-start"]').textContent = t.from;
        document.querySelector('label[for="hk-end"]').textContent = t.to;
        document.querySelector(".hk-hint").textContent = t.hint;

        const rows = document.querySelectorAll(".hk-counter-row");
        rows[0].querySelector(".hk-label").textContent = t.adults;
        rows[0].querySelector(".hk-sublabel").textContent = t.adultsSub;
        rows[1].querySelector(".hk-label").textContent = t.kids;
        rows[1].querySelector(".hk-sublabel").textContent = t.kidsSub;

        $("hk-submit").textContent = t.cta;
        dur.textContent = t.durationPrefix + " –";
      }

      function parseLocalISODate(iso) {
        const [y, m, d] = iso.split("-").map(Number);
        return new Date(y, m - 1, d, 12, 0, 0, 0);
      }

      function toISODateLocal(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function addDaysISO(iso, n) {
        const dt = parseLocalISODate(iso);
        dt.setDate(dt.getDate() + n);
        return toISODateLocal(dt);
      }

      function diffDays(startISO, endISO) {
        const start = parseLocalISODate(startISO);
        const end = parseLocalISODate(endISO);
        return Math.round((end - start) / 86400000) + 1;
      }

      function toLocalISOString(date) {
        const pad = (num, len = 2) => String(num).padStart(len, "0");

        const year = date.getFullYear();
        const month = pad(date.getMonth() + 1);
        const day = pad(date.getDate());
        const hours = pad(date.getHours());
        const minutes = pad(date.getMinutes());
        const seconds = pad(date.getSeconds());
        const ms = pad(date.getMilliseconds(), 3);

        const offsetMin = -date.getTimezoneOffset();
        const sign = offsetMin >= 0 ? "+" : "-";
        const abs = Math.abs(offsetMin);
        const offsetHours = pad(Math.floor(abs / 60));
        const offsetMinutes = pad(abs % 60);

        return `${year}-${month}-${day}T${hours}:${minutes}:${seconds}.${ms}${sign}${offsetHours}:${offsetMinutes}`;
      }

      function updateCounterButtons() {
        const total = totalTickets();

        adultsMinusBtn.disabled = adults <= 0 || (total <= 1 && adults > 0);
        kidsMinusBtn.disabled = kids <= 0 || (total <= 1 && kids > 0);

        adultsPlusBtn.disabled = total >= MAX_TICKETS;
        kidsPlusBtn.disabled = total >= MAX_TICKETS;
      }

      function setCount(type, value) {
        value = Math.max(0, Math.min(MAX_TICKETS, value | 0));

        if (type === "adults") {
          adults = value;
          adultsCount.textContent = String(value);
        } else {
          kids = value;
          kidsCount.textContent = String(value);
        }

        updateCounterButtons();
        hideError();
      }

      function bindPress(id, handler) {
        const el = $(id);
        let touchedAt = 0;

        el.addEventListener("touchend", function (e) {
          touchedAt = Date.now();
          e.preventDefault();
          handler();
        }, { passive: false });

        el.addEventListener("click", function (e) {
          if (Date.now() - touchedAt < 700) {
            e.preventDefault();
            return;
          }
          handler();
        });
      }

      bindPress("hk-adults-minus", () => {
        if (adults <= 0) return;
        if (totalTickets() <= 1) return;
        setCount("adults", adults - 1);
      });

      bindPress("hk-adults-plus", () => {
        if (totalTickets() >= MAX_TICKETS) return;
        setCount("adults", adults + 1);
      });

      bindPress("hk-kids-minus", () => {
        if (kids <= 0) return;
        if (totalTickets() <= 1) return;
        setCount("kids", kids - 1);
      });

      bindPress("hk-kids-plus", () => {
        if (totalTickets() >= MAX_TICKETS) return;
        setCount("kids", kids + 1);
      });

      function updateDuration() {
        const t = TEXTS[LANG];
        const s = elStart.value;
        const e = elEnd.value || s;

        if (!s) {
          dur.textContent = t.durationPrefix + " –";
          return;
        }

        const d = diffDays(s, e);
        dur.textContent = `${t.durationPrefix} ${d} ${d === 1 ? t.day : t.days}`;
      }

      function syncConstraints() {
        const s = elStart.value;
        hideError();

        if (!s) {
          elEnd.value = "";
          elEnd.min = "";
          elEnd.max = "";
          elEnd.disabled = true;
          updateDuration();
          return;
        }

        elEnd.disabled = false;
        elEnd.min = s;
        elEnd.max = addDaysISO(s, MAX_DAYS - 1);

        if (elEnd.value) {
          const selectedDuration = diffDays(s, elEnd.value);
          if (elEnd.value < s || selectedDuration < 1 || selectedDuration > MAX_DAYS) {
            elEnd.value = "";
          }
        }

        updateDuration();
      }

      ["input", "change", "blur"].forEach((evt) => {
        elStart.addEventListener(evt, syncConstraints);
        elEnd.addEventListener(evt, function () {
          hideError();

          if (elStart.value && elEnd.value) {
            const d = diffDays(elStart.value, elEnd.value);
            if (d < 1 || d > MAX_DAYS) {
              elEnd.value = "";
            }
          }

          updateDuration();
        });
      });

      function buildShopUrl(formState) {
        const base = (LANG === "en")
          ? "https://shop.hochkar.com/en/products/skitickets"
          : "https://shop.hochkar.com/products/skitickets";

        const url = new URL(base);

        const UTM_DEFAULT = {
          utm_source: "referral",
          utm_medium: "widget",
          utm_campaign: "hok",
          utm_content: "undefined"
        };

        const utms = { ...UTM_DEFAULT };

        ["utm_source", "utm_medium", "utm_campaign", "utm_content"].forEach((k) => {
          if (qs.get(k)) utms[k] = qs.get(k);
        });

        Object.entries(utms).forEach(([k, v]) => url.searchParams.set(k, v));
        url.searchParams.set("formState", JSON.stringify(formState));

        return url.toString();
      }

      $("hk-submit").addEventListener("click", function () {
        const t = TEXTS[LANG];
        hideError();

        const s = elStart.value;
        if (!s) {
          err.textContent = t.errNoStart;
          err.style.display = "block";
          return;
        }

        if (totalTickets() < 1) {
          err.textContent = t.errMinTickets;
          err.style.display = "block";
          return;
        }

        const e = elEnd.value || s;
        const d = diffDays(s, e);

        if (d < 1 || d > MAX_DAYS) {
          err.textContent = t.errDuration;
          err.style.display = "block";
          return;
        }

        const startBase = parseLocalISODate(s);
        const endBase = parseLocalISODate(e);

        const startDate = new Date(
          startBase.getFullYear(),
          startBase.getMonth(),
          startBase.getDate(),
          0, 0, 0, 0
        );

        const endDate = new Date(
          endBase.getFullYear(),
          endBase.getMonth(),
          endBase.getDate(),
          23, 59, 59, 999
        );

        const from = toLocalISOString(startDate);
        const to = toLocalISOString(endDate);

        const allocation = [];
        if (adults > 0) {
          allocation.push({
            kind: "anonymous",
            quantity: adults,
            personType: "adult"
          });
        }
        if (kids > 0) {
          allocation.push({
            kind: "anonymous",
            quantity: kids,
            personType: "child"
          });
        }

        const formState = {
          validity: { from, to },
          allocation: { kind: "persontype", values: allocation },
          attributes: { duration: `${d}d` }
        };

        window.open(buildShopUrl(formState), "_blank", "noopener");
      });

      applyTranslations();
      setCount("adults", 1);
      setCount("kids", 0);
      updateDuration();
    })();

    (function () {
      const ROOT = document.getElementById("hk-widget");
      const BODY_PADDING = 24;

      function calcHeight() {
        return Math.ceil(ROOT.getBoundingClientRect().height) + BODY_PADDING;
      }

      function post(reason) {
        parent.postMessage({
          type: "HKWIDGET_HEIGHT",
          height: calcHeight(),
          reason
        }, "*');
      }

      window.addEventListener("load", () => post("load"));
      window.addEventListener("resize", () => post("resize"));

      const mo = new MutationObserver(() => {
        clearTimeout(post._t);
        post._t = setTimeout(() => post("mut"), 50);
      });

      mo.observe(ROOT, {
        subtree: true,
        childList: true,
        attributes: true
      });

      setTimeout(() => post("delay300"), 300);
      setTimeout(() => post("delay1200"), 1200);
    })();
  </script>
</body>
</html>
